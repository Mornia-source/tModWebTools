<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video</title>
  <style>
    body {
      margin: 0;
      background: #0f1419;
      color: #e7edf5;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    video {
      max-width: 100%;
      max-height: 75vh;
      background: #000;
      border-radius: 8px;
    }
    .pickerRow {
      margin: 14px 0 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      max-width: 42rem;
    }
    .pickerRow label {
      font-size: 14px;
      opacity: 0.9;
    }
    select {
      min-width: 12rem;
      max-width: min(90vw, 28rem);
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: #1a2433;
      color: #e7edf5;
      font-size: 14px;
    }
    .meta {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
      max-width: 42rem;
      line-height: 1.5;
    }
    .meta[hidden],
    .pickerRow[hidden],
    video[hidden] {
      display: none !important;
    }
    a {
      color: #7dd3a0;
      margin-top: 18px;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <video id="player" controls playsinline autoplay muted hidden></video>
  <div id="pickerRow" class="pickerRow" hidden>
    <label for="videoSelect">Video</label>
    <select id="videoSelect" aria-label="Choose video file"></select>
  </div>
  <p id="emptyMsg" class="meta" hidden>
    No playable video files found next to the server JAR. Supported extensions:
    <code>.mp4</code>, <code>.webm</code>, <code>.ogv</code>, <code>.mov</code>, <code>.m4v</code>, <code>.mpeg</code>, <code>.mpg</code>.
  </p>
  <p id="errorMsg" class="meta" hidden></p>
  <a href="/">Back to tools</a>
  <script>
    (function () {
      var player = document.getElementById("player");
      var select = document.getElementById("videoSelect");
      var pickerRow = document.getElementById("pickerRow");
      var emptyMsg = document.getElementById("emptyMsg");
      var errorMsg = document.getElementById("errorMsg");

      function showError(text) {
        errorMsg.textContent = text;
        errorMsg.hidden = false;
        player.hidden = true;
        pickerRow.hidden = true;
        emptyMsg.hidden = true;
      }

      function attachSource(url) {
        player.src = url;
        player.hidden = false;
        player.load();
        player.play().catch(function () {});
      }

      fetch("/video/catalog", { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (list) {
          if (!list || !list.length) {
            emptyMsg.hidden = false;
            return;
          }
          if (list.length === 1) {
            attachSource(list[0].streamUrl);
            return;
          }
          pickerRow.hidden = false;
          player.hidden = false;
          select.innerHTML = "";
          list.forEach(function (item, i) {
            var opt = document.createElement("option");
            opt.value = item.streamUrl;
            opt.textContent = item.name;
            select.appendChild(opt);
          });
          select.addEventListener("change", function () {
            attachSource(select.value);
          });
          attachSource(list[0].streamUrl);
        })
        .catch(function (e) {
          showError("Could not load the video list. " + (e && e.message ? e.message : e));
        });
    })();
  </script>
</body>
</html>
