  <script>
    (function () {
      var base = "/trtools/terrasavr/local-index.html";
      function terrasavrFrameUrl() {
        var zh =
          window.TWT_I18N && typeof TWT_I18N.getLang === "function" && TWT_I18N.getLang() === "zh-CN";
        return zh ? base : base + "?twtLang=en";
      }
      var frame = document.getElementById("terrasavrFrame");
      function syncTerrasavrFrame() {
        if (!frame) return;
        var next = terrasavrFrameUrl();
        if (frame.getAttribute("data-twt-sv-src") !== next) {
          frame.setAttribute("data-twt-sv-src", next);
          frame.src = next;
        }
      }
      syncTerrasavrFrame();
      window.addEventListener("twt:i18n-applied", syncTerrasavrFrame);
      window.addEventListener("storage", function (ev) {
        if (ev.key === "trtools.lang") syncTerrasavrFrame();
      });
    })();
  </script>
