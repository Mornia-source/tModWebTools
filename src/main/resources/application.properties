spring.application.name=tModLoaderTools
# 反代（Nginx）后 redirect:/ 等能生成正确的 https 与 Host，避免 Location 指向 127.0.0.1:8080
server.forward-headers-strategy=framework
# 经 Cloudflare 时，真实访客 IP 在 CF-Connecting-IP；请在源站 Nginx 透传，否则在线人数/统计仍会落到 CF 节点 IP。示例：
# proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
# proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# proxy_set_header X-Forwarded-Proto $scheme;

# 上传 .tmod 文件（可能较大）
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=220MB
