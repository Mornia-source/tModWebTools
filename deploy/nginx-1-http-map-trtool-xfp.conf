# 放入主配置 http { } 内：在宝塔「nginx.conf」的 http { 里加一行 include（路径按你实际放置调整）：
#   include /www/server/panel/vhost/nginx/map-trtool-xfp.conf;
# 或将本文件内容原样粘贴进 http { }（与其它 map 同级）。
#
# 变量名 $trtool_xfp 供站点配置里的 proxy_set_header X-Forwarded-Proto 使用。

map $http_x_forwarded_proto $trtool_xfp {
    ~.+     $http_x_forwarded_proto;
    default $scheme;
}
