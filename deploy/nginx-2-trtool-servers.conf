# trtool.yingtaoshu.org — 两个 server 块（替换宝塔里该站点原配置）
# 依赖：已在 http { } 中加载 map，定义 $trtool_xfp（见 nginx-1-http-map-trtool-xfp.conf）

server {
    listen 80;
    server_name trtool.yingtaoshu.org;

    location / {
        return 301 https://$host$request_uri;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/java_node_ssl;
        allow all;
        default_type "text/plain";
        try_files $uri =404;
    }
}

server {
    listen 443 ssl http2;
    listen 443 quic;
    server_name trtool.yingtaoshu.org;

    ssl_certificate     /www/server/panel/vhost/cert/tModWebTools/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/tModWebTools/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env) {
        return 404;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/java_node_ssl;
        allow all;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $trtool_xfp;

        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
        proxy_busy_buffers_size 64k;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $trtool_xfp;

        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
        proxy_busy_buffers_size 64k;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        client_max_body_size 512m;
    }

    access_log  /www/wwwlogs/tModWebTools.ssl.log;
    error_log   /www/wwwlogs/tModWebTools.ssl.error.log;
}
